worker_processes  1;
pid /run/nginx/nginx.pid;
error_log /var/log/nginx/error.log;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    server_tokens off;

    client_body_buffer_size 16k;
    client_max_body_size 512k;
    client_body_temp_path /var/log/nginx/tmp;
    proxy_temp_path /var/log/nginx/proxy;
    fastcgi_temp_path /var/log/nginx/fastcgi;
    uwsgi_temp_path /var/log/nginx/uwsgi;
    scgi_temp_path /var/log/nginx/scgi;

    server {
        listen       80;
        server_name  localhost;

        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options DENY;
        add_header Referrer-Policy strict-origin-when-cross-origin;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()";
        add_header Content-Security-Policy "default-src 'self'; style-src 'self'; script-src 'self'";

        location / {
            root   /usr/share/nginx/html;
            index  index.html;
        }

        location /api/ {
            limit_except GET POST {
                deny all;
            }

            proxy_pass http://127.0.0.1:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   /usr/share/nginx/html;
        }
    }
}
