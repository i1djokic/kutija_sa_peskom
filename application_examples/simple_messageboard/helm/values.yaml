replicaCount: 1

image:
  repository: 127.0.0.1:5000/simple_messageboard
  tag: latest
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: ""
  annotations: {}
  hosts:
    - host: msgb.test
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - msgb.test
      secretName: msgb-tls

db:
  type: mysql
  host: ""
  port: "3306"
  user: root
  name: app
  existingSecret: ""
  existingSecretKey: mariadb-root-password

mariadb:
  enabled: true
  replicaCount: 1
  rootPassword: "changeme"
  database: "app"
  user: "app"
  password: "apppass"
  image:
    repository: mariadb
    tag: 10.11
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 3306
  existingSecret: ""
  args:
    - --character-set-server=utf8mb4
    - --collation-server=utf8mb4_unicode_ci
  securityContext:
    runAsNonRoot: true
    runAsUser: 999
    fsGroup: 999
  persistence:
    enabled: true
    size: 1Gi
    accessModes:
      - ReadWriteOnce
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  livenessProbe:
    exec:
      command:
        - mariadb-admin
        - ping
    initialDelaySeconds: 30
    periodSeconds: 10
  readinessProbe:
    exec:
      command:
        - mariadb-admin
        - ping
    initialDelaySeconds: 5
    periodSeconds: 5

resources:
  requests:
    cpu: 100m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

securityContext:
  runAsNonRoot: true
  runAsUser: 1001
  fsGroup: 1001

containerSecurityContext:
  allowPrivilegeEscalation: false
  privileged: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
    add:
      - NET_BIND_SERVICE

probes:
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 10
  liveness:
    initialDelaySeconds: 15
    periodSeconds: 20

nodeSelector: {}

tolerations: []

affinity: {}
