apiVersion: v1
kind: Service
metadata:
  name: {{ include "messageboard.fullname" . }}-db
  labels:
    app.kubernetes.io/component: {{ include "messageboard.fullname" . }}-db
spec:
  type: {{ .Values.mariadb.service.type }}
  ports:
  - port: {{ .Values.mariadb.service.port }}
    targetPort: 3306
    name: mariadb
  selector:
    app.kubernetes.io/component: {{ include "messageboard.fullname" . }}-db
