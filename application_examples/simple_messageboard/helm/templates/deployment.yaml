apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "messageboard.fullname" . }}
  labels:
    {{- include "messageboard.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "messageboard.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "messageboard.labels" . | nindent 8 }}
    spec:
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      containers:
      - name: {{ .Chart.Name }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: {{ .Values.service.port }}
        env:
        - name: DB_TYPE
          value: {{ .Values.db.type }}
        - name: DB_HOST
          value: {{ .Values.db.host | default (printf "%s-db" (include "messageboard.fullname" .)) }}
        - name: DB_PORT
          value: {{ .Values.db.port }}
        - name: DB_USER
          value: {{ .Values.db.user }}
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.db.existingSecret | default (printf "%s-db" (include "messageboard.fullname" .)) }}
              key: {{ .Values.db.existingSecretKey }}
        - name: DB_NAME
          value: {{ .Values.db.name }}
        securityContext:
          {{- toYaml .Values.containerSecurityContext | nindent 10 }}
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        readinessProbe:
          httpGet:
            path: /
            port: {{ .Values.service.port }}
          initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
          periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
        livenessProbe:
          httpGet:
            path: /
            port: {{ .Values.service.port }}
          initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
          periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
        volumeMounts:
        - name: nginx-run
          mountPath: /run/nginx
        - name: nginx-log
          mountPath: /var/log/nginx
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: nginx-run
        emptyDir: {}
      - name: nginx-log
        emptyDir: {}
      - name: tmp
        emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
