apiVersion: v1
kind: Service
metadata:
  name: {{ include "messageboard.fullname" . }}
  labels:
    {{- include "messageboard.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "messageboard.selectorLabels" . | nindent 4 }}
  ports:
  - port: {{ .Values.service.port }}
    targetPort: {{ .Values.service.port }}
    protocol: TCP
    name: http
