apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "messageboard.fullname" . }}-db
  labels:
    app.kubernetes.io/component: {{ include "messageboard.fullname" . }}-db
spec:
  serviceName: {{ include "messageboard.fullname" . }}-db
  replicas: {{ .Values.mariadb.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/component: {{ include "messageboard.fullname" . }}-db
  template:
    metadata:
      labels:
        app.kubernetes.io/component: {{ include "messageboard.fullname" . }}-db
    spec:
      {{- with .Values.mariadb.securityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: mariadb
        image: "{{ .Values.mariadb.image.repository }}:{{ .Values.mariadb.image.tag }}"
        imagePullPolicy: {{ .Values.mariadb.image.pullPolicy }}
        ports:
        - containerPort: 3306
          name: mariadb
        env:
        - name: MARIADB_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.mariadb.existingSecret | default (printf "%s-db" (include "messageboard.fullname" .)) }}
              key: mariadb-root-password
        - name: MARIADB_DATABASE
          valueFrom:
            secretKeyRef:
              name: {{ .Values.mariadb.existingSecret | default (printf "%s-db" (include "messageboard.fullname" .)) }}
              key: database-name
        - name: MARIADB_USER
          valueFrom:
            secretKeyRef:
              name: {{ .Values.mariadb.existingSecret | default (printf "%s-db" (include "messageboard.fullname" .)) }}
              key: database-user
        - name: MARIADB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.mariadb.existingSecret | default (printf "%s-db" (include "messageboard.fullname" .)) }}
              key: database-password
        args:
        {{- range .Values.mariadb.args }}
        - {{ . | quote }}
        {{- end }}
        volumeMounts:
        - name: data
          mountPath: /var/lib/mysql
        {{- with .Values.mariadb.resources }}
        resources:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with .Values.mariadb.livenessProbe }}
        livenessProbe:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with .Values.mariadb.readinessProbe }}
        readinessProbe:
          {{- toYaml . | nindent 10 }}
        {{- end }}
  {{- if .Values.mariadb.persistence.enabled }}
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes:
      {{- range .Values.mariadb.persistence.accessModes }}
      - {{ . | quote }}
      {{- end }}
      resources:
        requests:
          storage: {{ .Values.mariadb.persistence.size }}
  {{- end }}
