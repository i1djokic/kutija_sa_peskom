apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: messageboard-db
  namespace: smapp
  labels:
    app: messageboard-db
spec:
  serviceName: messageboard-db
  replicas: 1
  selector:
    matchLabels:
      app: messageboard-db
  template:
    metadata:
      labels:
        app: messageboard-db
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        fsGroup: 999
      containers:
      - name: mariadb
        image: mariadb:10.11
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3306
          name: mariadb
        env:
        - name: MARIADB_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: messageboard-db
              key: mariadb-root-password
        - name: MARIADB_DATABASE
          valueFrom:
            secretKeyRef:
              name: messageboard-db
              key: database-name
        - name: MARIADB_USER
          valueFrom:
            secretKeyRef:
              name: messageboard-db
              key: database-user
        - name: MARIADB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: messageboard-db
              key: database-password
        args:
        - --character-set-server=utf8mb4
        - --collation-server=utf8mb4_unicode_ci
        volumeMounts:
        - name: data
          mountPath: /var/lib/mysql
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          exec:
            command:
            - mariadb-admin
            - ping
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - mariadb-admin
            - ping
          initialDelaySeconds: 5
          periodSeconds: 5
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 1Gi
