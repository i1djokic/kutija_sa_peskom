{{- if .Values.ingress.enabled }}
{{- $tlsName := printf "%s-tls" (include "opencode.fullname" .) }}
{{- $ca := genCA "opencode-ca" 3650 }}
{{- $cert := genSignedCert .Values.ingress.host (list) (list .Values.ingress.host) 3650 $ca }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $tlsName }}
  labels:
    {{- include "opencode.labels" . | nindent 4 }}
type: kubernetes.io/tls
data:
  tls.crt: {{ $cert.Cert | b64enc }}
  tls.key: {{ $cert.Key | b64enc }}
{{- end }}
