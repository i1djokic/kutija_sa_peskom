{{- if and .Values.ingress.tls.enabled .Values.ingress.tls.certManager.enabled (not .Values.ingress.tls.existingSecret) }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "mariadb.fullname" . }}-tls
  labels:
    {{- include "mariadb.labels" . | nindent 4 }}
spec:
  secretName: {{ include "mariadb.tlsSecretName" . }}
  duration: 2160h
  renewBefore: 360h
  dnsNames:
    {{- range .Values.ingress.tls.hosts }}
    - {{ . | quote }}
    {{- end }}
  issuerRef:
    name: {{ .Values.ingress.tls.issuerRef.name }}
    kind: {{ .Values.ingress.tls.issuerRef.kind }}
{{- end }}
