apiVersion: v1
kind: Service
metadata:
  name: {{ include "mariadb.fullname" . }}-db
  labels:
    {{- include "mariadb.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
spec:
  type: ClusterIP
  ports:
    - port: 3306
      targetPort: mysql
      protocol: TCP
      name: mysql
  selector:
    {{- include "mariadb.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: database
