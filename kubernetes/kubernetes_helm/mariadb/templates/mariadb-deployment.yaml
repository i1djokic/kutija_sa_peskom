apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mariadb.fullname" . }}-db
  labels:
    {{- include "mariadb.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
spec:
  replicas: 1
  strategy:
    type: Recreate
    rollingUpdate: null
  selector:
    matchLabels:
      {{- include "mariadb.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: database
  template:
    metadata:
      labels:
        {{- include "mariadb.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: database
    spec:
      enableServiceLinks: false
      containers:
        - name: mariadb
          image: "{{ .Values.mariadb.image.repository }}:{{ .Values.mariadb.image.tag }}"
          imagePullPolicy: {{ .Values.mariadb.image.pullPolicy }}
          ports:
            - name: mysql
              containerPort: 3306
              protocol: TCP
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "mariadb.fullname" . }}-db
                  key: root-password
            - name: MYSQL_PWD
              valueFrom:
                secretKeyRef:
                  name: {{ include "mariadb.fullname" . }}-db
                  key: root-password
            - name: MYSQL_DATABASE
              value: {{ .Values.mariadb.database }}
          livenessProbe:
            exec:
              command: ["mariadb-admin", "ping", "-u", "root"]
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["mariadb-admin", "ping", "-u", "root"]
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            {{- toYaml .Values.mariadb.resources | nindent 12 }}
          volumeMounts:
            {{- if .Values.mariadb.persistence.enabled }}
            - name: data
              mountPath: /var/lib/mysql
            {{- end }}
      volumes:
        {{- if .Values.mariadb.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "mariadb.fullname" . }}-data
        {{- end }}
