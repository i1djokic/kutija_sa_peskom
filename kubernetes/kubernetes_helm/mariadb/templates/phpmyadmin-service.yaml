apiVersion: v1
kind: Service
metadata:
  name: {{ include "mariadb.fullname" . }}-pma
  labels:
    {{- include "mariadb.labels" . | nindent 4 }}
    app.kubernetes.io/component: phpmyadmin
  {{- with .Values.phpmyadmin.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.phpmyadmin.service.type }}
  ports:
    - port: {{ .Values.phpmyadmin.service.port }}
      targetPort: http
      protocol: TCP
      name: http
      {{- if and (eq .Values.phpmyadmin.service.type "NodePort") .Values.phpmyadmin.service.nodePort }}
      nodePort: {{ .Values.phpmyadmin.service.nodePort }}
      {{- end }}
  selector:
    {{- include "mariadb.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: phpmyadmin
