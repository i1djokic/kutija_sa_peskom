{{- if and .Values.ingress.tls.enabled .Values.ingress.tls.autoGenerate (not .Values.ingress.tls.existingSecret) (not .Values.ingress.tls.certManager.enabled) }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "mariadb.fullname" . }}-tls
  labels:
    {{- include "mariadb.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "mariadb.fullname" . }}-tls
  labels:
    {{- include "mariadb.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "get", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "mariadb.fullname" . }}-tls
  labels:
    {{- include "mariadb.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "mariadb.fullname" . }}-tls
subjects:
  - kind: ServiceAccount
    name: {{ include "mariadb.fullname" . }}-tls
    namespace: {{ .Release.Namespace }}
{{- end }}
