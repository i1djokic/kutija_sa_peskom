---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mariadb-tls
  namespace: mariadb
  labels:
    app.kubernetes.io/name: mariadb
    app.kubernetes.io/instance: mariadb
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: mariadb-tls
  namespace: mariadb
  labels:
    app.kubernetes.io/name: mariadb
    app.kubernetes.io/instance: mariadb
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "get", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mariadb-tls
  namespace: mariadb
  labels:
    app.kubernetes.io/name: mariadb
    app.kubernetes.io/instance: mariadb
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: mariadb-tls
subjects:
  - kind: ServiceAccount
    name: mariadb-tls
    namespace: mariadb
---
apiVersion: batch/v1
kind: Job
metadata:
  name: mariadb-tls-gen
  namespace: mariadb
  labels:
    app.kubernetes.io/name: mariadb
    app.kubernetes.io/instance: mariadb
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mariadb
        app.kubernetes.io/instance: mariadb
    spec:
      serviceAccountName: mariadb-tls
      restartPolicy: Never
      initContainers:
        - name: openssl
          image: alpine/openssl:latest
          command:
            - /bin/sh
            - -c
            - |
              openssl req -x509 -nodes -days 3650 -newkey rsa:2048 \
                -keyout /certs/tls.key \
                -out /certs/tls.crt \
                -subj "/CN=db.test" \
                -addext "subjectAltName=DNS:db.test" && \
              chmod 644 /certs/tls.key /certs/tls.crt
          volumeMounts:
            - name: certs
              mountPath: /certs
      containers:
        - name: kubectl
          image: bitnami/kubectl:latest
          command:
            - /bin/sh
            - -c
            - |
              kubectl delete secret mariadb-tls -n mariadb --ignore-not-found
              kubectl create secret tls mariadb-tls \
                --cert=/certs/tls.crt \
                --key=/certs/tls.key \
                -n mariadb
          volumeMounts:
            - name: certs
              mountPath: /certs
      volumes:
        - name: certs
          emptyDir: {}
