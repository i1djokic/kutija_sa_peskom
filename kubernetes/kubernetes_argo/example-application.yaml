apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: helloworld
  namespace: argocd
spec:
  project: default
  source:
    # ┌─ CHANGE THIS to your actual Git repo URL ──────────────────┐
    repoURL: https://github.com/YOUR_USER/YOUR_REPO.git
    targetRevision: HEAD
    path: apps/helloworld
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
