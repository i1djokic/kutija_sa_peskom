apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: registry-pvc
  namespace: registry
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: docker-registry
  namespace: registry
  labels:
    app: docker-registry
spec:
  replicas: 1
  selector:
    matchLabels:
      app: docker-registry
  template:
    metadata:
      labels:
        app: docker-registry
    spec:
      containers:
        - name: registry
          image: registry:2
          ports:
            - containerPort: 5000
          env:
            - name: REGISTRY_STORAGE_FILESYSTEM_ROOTDIRECTORY
              value: /var/lib/registry
          volumeMounts:
            - name: data
              mountPath: /var/lib/registry
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: registry-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: docker-registry
  namespace: registry
spec:
  selector:
    app: docker-registry
  ports:
    - port: 5000
      targetPort: 5000
      name: registry
  type: LoadBalancer

---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: registry-redirect
  namespace: registry
spec:
  redirectScheme:
    scheme: https
    permanent: true

---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: docker-registry-http
  namespace: registry
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`registry.test`)
      kind: Rule
      middlewares:
        - name: registry-redirect
      services:
        - name: docker-registry
          port: 5000

---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: docker-registry-https
  namespace: registry
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`registry.test`)
      kind: Rule
      services:
        - name: docker-registry
          port: 5000
  tls:
    secretName: registry-tls

