apiVersion: v1
kind: Namespace
metadata:
  name: image-builder

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: image-builder-data
  namespace: image-builder
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: image-builder
  namespace: image-builder
  labels:
    app: image-builder
spec:
  replicas: 1
  selector:
    matchLabels:
      app: image-builder
  template:
    metadata:
      labels:
        app: image-builder
    spec:
      containers:
        - name: app
          image: 127.0.0.1:5000/image-builder:v1
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: DATA_DIR
              value: /data
            - name: DOCKER_REGISTRY
              value: "docker-registry.registry:5000"
            - name: DOCKER_HOST
              value: "tcp://localhost:2375"
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"

        - name: dind
          image: docker:27-dind
          securityContext:
            privileged: true
          env:
            - name: DOCKER_TLS_CERTDIR
              value: ""
          args:
            - dockerd
            - --host=unix:///var/run/docker.sock
            - --host=tcp://0.0.0.0:2375
            - --insecure-registry=docker-registry.registry:5000
          volumeMounts:
            - name: data
              mountPath: /var/lib/docker
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "1"

      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: image-builder-data

---
apiVersion: v1
kind: Service
metadata:
  name: image-builder
  namespace: image-builder
spec:
  selector:
    app: image-builder
  ports:
    - port: 8000
      targetPort: 8000

---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: image-builder
  namespace: image-builder
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`imb.test`)
      kind: Rule
      services:
        - name: image-builder
          port: 8000
  tls:
    secretName: registry-tls
