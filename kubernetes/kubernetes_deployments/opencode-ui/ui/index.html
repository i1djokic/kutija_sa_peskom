<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>opencode Chat</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">
  <header>
    <div class="header-content">
      <h1>opencode Chat</h1>
      <button id="newChatBtn" class="btn">+ New Chat</button>
    </div>
  </header>

  <main>
    <div id="conversationList" class="sidebar">
      <h3>Conversations</h3>
      <div id="convList"></div>
    </div>

    <div id="chatArea" class="chat-area">
      <div id="messages" class="messages"></div>
      <div id="inputArea" class="input-area">
        <textarea id="messageInput" rows="3" placeholder="Ask opencode something..."></textarea>
        <button id="sendBtn" class="btn btn-send">Send</button>
      </div>
    </div>
  </main>
</div>

<div id="loadingOverlay" class="loading-overlay hidden">
  <div class="spinner"></div>
  <p>opencode is thinking...</p>
</div>

<script src="app.js"></script>
</body>
</html>
