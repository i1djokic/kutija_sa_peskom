apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "opencode-ui.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "opencode-ui.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "opencode-ui.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "opencode-ui.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: OPENCODE_TELEMETRY_DISABLED
              value: "1"
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
