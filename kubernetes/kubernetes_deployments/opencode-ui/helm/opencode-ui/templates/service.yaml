apiVersion: v1
kind: Service
metadata:
  name: {{ include "opencode-ui.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "opencode-ui.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "opencode-ui.selectorLabels" . | nindent 4 }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
