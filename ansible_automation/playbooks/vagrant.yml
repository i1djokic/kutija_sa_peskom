---
- name: Bootstrap Vagrant VMs with essential packages
  hosts: all
  gather_facts: true
  become: true

  roles:
    - role: packages
      tags: packages

- name: Install and configure Apache on Vagrant VMs
  hosts: all
  become: true

  roles:
    - role: apache
      tags: apache

  post_tasks:
    - name: Display web server info
      ansible.builtin.debug:
        msg:
          - "Apache configured on {{ ansible_fqdn }}"
          - "Document root: {{ apache_document_root }}"
          - "Listen port: {{ apache_listen_port }}"
      tags: apache
